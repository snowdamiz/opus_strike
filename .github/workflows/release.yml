name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false
  queue: max

env:
  SERVER_APP: opus-strike-server
  CLIENT_APP: opus-strike-client
  SERVER_ORIGIN: https://api.slopheroes.xyz
  CLIENT_ORIGIN: https://slopheroes.xyz
  EXPECTED_CLIENT_SERVER_URL: wss://api.slopheroes.xyz

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Check Prisma migration safety
        run: node scripts/check-prisma-migration-safety.mjs
        env:
          MIGRATION_SAFETY_BASE: ${{ github.event.before }}
          MIGRATION_SAFETY_HEAD: ${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1
        with:
          version: 0.4.67

      - name: Deploy server
        run: >
          flyctl deploy . --config apps/server/fly.toml --app "$SERVER_APP" --remote-only
          --dockerfile apps/server/Dockerfile
          --release-command-timeout 10m
          --wait-timeout 10m
          --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify server migration status
        run: flyctl ssh console --app "$SERVER_APP" --command 'sh -lc "cd /app && pnpm --filter @voxel-strike/server exec prisma migrate status"'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployed server health
        run: curl -fsSL "$SERVER_ORIGIN/health" >/dev/null

      - name: Verify client server URL config
        run: |
          set -euo pipefail

          if ! grep -Fq "VITE_SERVER_URL = \"$EXPECTED_CLIENT_SERVER_URL\"" apps/client/fly.toml; then
            echo "::error file=apps/client/fly.toml::Expected VITE_SERVER_URL to be $EXPECTED_CLIENT_SERVER_URL"
            exit 1
          fi

          if grep -R -n -E 'wss://(opus-strike-server\.fly\.dev|voxel-strike\.example\.com)' .github apps/client/src apps/client/fly.toml apps/client/.env.example; then
            echo "::error::Found stale client server URL in CI-controlled client config"
            exit 1
          fi

      - name: Deploy client
        run: >
          flyctl deploy . --config apps/client/fly.toml --app "$CLIENT_APP" --remote-only
          --dockerfile apps/client/Dockerfile
          --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployed client auth endpoint
        run: |
          set -euo pipefail

          index_file="$(mktemp)"
          bundle_file="$(mktemp)"
          curl -fsSL "$CLIENT_ORIGIN/" -o "$index_file"

          bundle_path="$(grep -o 'assets/[^" ]*\.js' "$index_file" | head -n 1)"
          if [ -z "$bundle_path" ]; then
            echo "::error::Could not find deployed client bundle in $CLIENT_ORIGIN/"
            exit 1
          fi

          curl -fsSL "$CLIENT_ORIGIN/$bundle_path" -o "$bundle_file"

          if ! grep -Fq "$EXPECTED_CLIENT_SERVER_URL" "$bundle_file"; then
            echo "::error::Deployed client bundle does not contain $EXPECTED_CLIENT_SERVER_URL"
            exit 1
          fi

          if grep -E 'wss://(opus-strike-server\.fly\.dev|voxel-strike\.example\.com)' "$bundle_file"; then
            echo "::error::Deployed client bundle contains a stale server URL"
            exit 1
          fi
