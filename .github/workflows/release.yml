name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVER_APP: opus-strike-server
  CLIENT_APP: opus-strike-client
  SERVER_URL: wss://opus-strike-server.fly.dev

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1
        with:
          version: 0.4.54

      - name: Deploy server
        run: >
          flyctl deploy . --config apps/server/fly.toml --app "$SERVER_APP" --remote-only
          --dockerfile apps/server/Dockerfile
          --wait-timeout 10m
          --skip-release-command
          --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run server migrations
        run: flyctl ssh console --app "$SERVER_APP" --command 'sh -lc "pnpm --filter @voxel-strike/server db:deploy"'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy client
        run: >
          flyctl deploy . --config apps/client/fly.toml --app "$CLIENT_APP" --remote-only
          --dockerfile apps/client/Dockerfile
          --build-arg VITE_SERVER_URL="$SERVER_URL"
          --build-arg VITE_DISCORD_AUTH_ENABLED=true
          --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
