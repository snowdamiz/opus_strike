services:
  postgres:
    image: postgres:16-alpine
    container_name: opus_strike_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: opus_strike
      POSTGRES_PASSWORD: opus_strike_dev
      POSTGRES_DB: opus_strike
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opus_strike"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opus_strike_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: opus_strike_livekit
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret"

volumes:
  postgres_data:
