app = "opus-strike-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "pnpm --filter @voxel-strike/server db:deploy"

[env]
  NODE_ENV = "production"
  PORT = "2567"
  CLIENT_ORIGIN = "https://slopheroes.xyz"
  PUBLIC_CLIENT_ORIGIN = "https://slopheroes.xyz"
  ALLOWED_ORIGINS = "https://slopheroes.xyz,https://www.slopheroes.xyz,https://opus-strike-client.fly.dev"
  DISCORD_REDIRECT_URI = "https://api.slopheroes.xyz/auth/discord/callback"
  WAGER_SOL_ENABLED = "false"
  COLYSEUS_DISTRIBUTED = "1"
  COLYSEUS_ROUTING_STRATEGY = "fly_replay"
  COLYSEUS_PUBLIC_ADDRESS = "api.slopheroes.xyz"
  COLYSEUS_REQUIRE_PUBLIC_ADDRESS = "1"
  COLYSEUS_PRESENCE_SHORT_TIMEOUT = "10000"
  COLYSEUS_ROOM_CREATE_STRATEGY = "local"
  GAME_ROOM_SEAT_RESERVATION_SECONDS = "60"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [http_service.concurrency]
    type = "connections"
    soft_limit = 64
    hard_limit = 96

[metrics]
  port = 2567
  path = "/metrics"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2
