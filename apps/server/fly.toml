app = "opus-strike-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "pnpm --filter @voxel-strike/server db:deploy"
  release_command_timeout = "10m"
  wait_timeout = "10m"

[processes]
  app = "node dist/index.js"
  asia = "node dist/index.js"

[env]
  NODE_ENV = "production"
  PORT = "2567"
  WAGER_SOL_ENABLED = "false"
  CLIENT_ORIGIN = "https://slopheroes.xyz"
  PUBLIC_CLIENT_ORIGIN = "https://slopheroes.xyz"
  ALLOWED_ORIGINS = "https://slopheroes.xyz,https://www.slopheroes.xyz,https://opus-strike-client.fly.dev"
  DISCORD_REDIRECT_URI = "https://api.slopheroes.xyz/auth/discord/callback"
  COLYSEUS_DISTRIBUTED = "1"
  COLYSEUS_ROUTING_STRATEGY = "fly_replay"
  COLYSEUS_PUBLIC_ADDRESS = "api.slopheroes.xyz"
  COLYSEUS_REQUIRE_PUBLIC_ADDRESS = "1"
  COLYSEUS_PRESENCE_SHORT_TIMEOUT = "10000"
  COLYSEUS_ROOM_CREATE_STRATEGY = "local"
  COLYSEUS_WEBSOCKET_MAX_PAYLOAD_BYTES = "65536"
  GAME_ROOM_SEAT_RESERVATION_SECONDS = "60"
  PREGENERATED_MAP_AUTO_TOP_UP_MAX_GENERATED_PER_RUN = "6"
  PREGENERATED_MAP_AUTO_TOP_UP_MAX_LOCAL_CCU = "4"
  PREGENERATED_MAP_AUTO_TOP_UP_MAX_CAPACITY_PRESSURE = "0.35"
  PREGENERATED_MAP_FALLBACK_ENABLED = "1"
  PREGENERATED_MAP_POOL_ARENA_READY_PER_SLICE = "1"
  PREGENERATED_MAP_POOL_BATTLE_ROYAL_READY_PER_SLICE = "1"

[[services]]
  internal_port = 2567
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [services.concurrency]
    type = "connections"
    soft_limit = 64
    hard_limit = 96

[[services]]
  internal_port = 2567
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["asia"]

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [services.concurrency]
    type = "connections"
    soft_limit = 32
    hard_limit = 48

[metrics]
  port = 2567
  path = "/metrics"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 4
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2
  processes = ["asia"]
