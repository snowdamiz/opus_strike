app = "opus-strike-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "pnpm --filter @voxel-strike/server db:deploy"

[env]
  NODE_ENV = "production"
  PORT = "2567"
  CLIENT_ORIGIN = "https://opus-strike-client.fly.dev"
  PUBLIC_CLIENT_ORIGIN = "https://opus-strike-client.fly.dev"
  DISCORD_AUTH_ENABLED = "false"
  DISCORD_REDIRECT_URI = "https://opus-strike-server.fly.dev/auth/discord/callback"
  WAGER_SOL_ENABLED = "false"
  COLYSEUS_DISTRIBUTED = "1"
  COLYSEUS_ROUTING_STRATEGY = "fly_replay"
  COLYSEUS_PUBLIC_ADDRESS = "opus-strike-server.fly.dev"
  COLYSEUS_REQUIRE_PUBLIC_ADDRESS = "1"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
