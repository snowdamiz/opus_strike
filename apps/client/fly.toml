app = "opus-strike-client"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_SERVER_URL = "wss://api.slopheroes.xyz"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
