version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxel-strike-db
    environment:
      POSTGRES_USER: voxelstrike
      POSTGRES_PASSWORD: voxelstrike_dev
      POSTGRES_DB: voxelstrike
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxelstrike -d voxelstrike"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
